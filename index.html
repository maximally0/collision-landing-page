  <script>
    // Lightweight Motion shim — CSS transitions triggered after mount
    (function() {
      const { createElement: h, forwardRef, useRef, useEffect, useState, useMemo } = React;

      const mergeRef = (ref, node) => {
        if (!ref) return;
        if (typeof ref === 'function') ref(node);
        else ref.current = node;
      };

      function resolveEase(ease) {
        if (!ease) return 'cubic-bezier(0.16,1,0.3,1)';
        if (Array.isArray(ease)) return `cubic-bezier(${ease.join(',')})`;
        const map = { easeOut:'cubic-bezier(0.16,1,0.3,1)', easeIn:'cubic-bezier(0.4,0,1,1)', linear:'linear' };
        return map[ease] || 'cubic-bezier(0.16,1,0.3,1)';
      }

      function buildTransform(x, y, scale) {
        const parts = [];
        if (x !== undefined || y !== undefined) parts.push(`translate(${x||0}px,${y||0}px)`);
        if (scale !== undefined) parts.push(`scale(${scale})`);
        return parts.length ? parts.join(' ') : 'none';
      }

      function extractVals(props) {
        if (!props) return {};
        const { opacity, x, y, scale } = props;
        return { opacity, x, y, scale };
      }

      function applyVals(vals) {
        const s = {};
        if (vals.opacity !== undefined) s.opacity = vals.opacity;
        const t = buildTransform(vals.x, vals.y, vals.scale);
        if (t !== 'none') s.transform = t;
        return s;
      }

      function createMotionComponent(tag) {
        return forwardRef(function MotionEl(props, outerRef) {
          const {
            initial, animate, transition = {},
            whileHover, whileTap,
            variants, style = {}, children, ...rest
          } = props;

          const [active, setActive] = useState(false);
          const [hover, setHover] = useState(false);
          const [tap, setTap] = useState(false);

          const resolveVariant = (v) => typeof v === 'string' && variants ? variants[v] : v;

          const initVals = extractVals(resolveVariant(initial) || {});
          const animVals = extractVals(resolveVariant(animate) || {});
          const hoverVals = extractVals(resolveVariant(whileHover) || {});
          const tapVals = extractVals(resolveVariant(whileTap) || {});

          const dur = transition.duration ?? 0.4;
          const delay = transition.delay ?? 0;
          const ease = resolveEase(transition.ease);

          // Trigger entrance after mount
          useEffect(() => {
            const t = setTimeout(() => setActive(true), 16);
            return () => clearTimeout(t);
          }, []);

          // Pick current state values
          let currentVals;
          if (tap && Object.keys(tapVals).length) currentVals = tapVals;
          else if (hover && Object.keys(hoverVals).length) currentVals = hoverVals;
          else if (active) currentVals = animVals;
          else currentVals = initVals;

          const isGesture = (hover && Object.keys(hoverVals).length) || (tap && Object.keys(tapVals).length);
          const transStr = isGesture
            ? 'transform 0.18s cubic-bezier(0.16,1,0.3,1), opacity 0.18s ease, box-shadow 0.18s ease'
            : `opacity ${dur}s ${ease} ${delay}s, transform ${dur}s ${ease} ${delay}s`;

          const computedStyle = {
            ...style,
            ...applyVals(currentVals),
            transition: transStr,
          };

          const domProps = { ...rest };
          ['initial','animate','whileHover','whileTap','transition','variants'].forEach(k => delete domProps[k]);

          return h(tag, {
            ...domProps,
            ref: node => mergeRef(outerRef, node),
            style: computedStyle,
            onMouseEnter: e => { setHover(true); rest.onMouseEnter?.(e); },
            onMouseLeave: e => { setHover(false); setTap(false); rest.onMouseLeave?.(e); },
            onMouseDown: e => { setTap(true); rest.onMouseDown?.(e); },
            onMouseUp: e => { setTap(false); rest.onMouseUp?.(e); },
          }, children);
        });
      }

      // useInView — triggers animation when element enters viewport
      function useInView(ref, options = {}) {
        const [inView, setInView] = useState(false);
        useEffect(() => {
          const el = ref.current;
          if (!el) return;
          const obs = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) {
              setTimeout(() => setInView(true), 16);
              if (options.once) obs.disconnect();
            } else if (!options.once) {
              setInView(false);
            }
          }, { rootMargin: options.margin || '0px' });
          obs.observe(el);
          return () => obs.disconnect();
        }, []);
        return inView;
      }

      function AnimatePresence({ children }) { return children; }

      const tags = ['div','section','footer','h1','h2','h3','p','a','button','span','video','nav'];
      const motion = {};
      tags.forEach(t => { motion[t] = createMotionComponent(t); });

      window.Motion = { motion, useInView, AnimatePresence };
    })();
  </script>
