<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collision — Start Your Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1400FF;
      --blue-bright: #4D6AFF;
      --blue-dim: #0A0080;
      --bg: #060610;
      --white: #f0f0f5;
      --white-70: rgba(240,240,245,0.7);
      --white-40: rgba(240,240,245,0.4);
      --white-20: rgba(240,240,245,0.2);
      --white-10: rgba(240,240,245,0.1);
      --white-05: rgba(240,240,245,0.05);
      --glass: rgba(6,6,16,0.55);
      --glass-border: rgba(240,240,245,0.08);
      --font-serif: 'Instrument Serif', serif;
      --font-sans: 'DM Sans', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; -webkit-overflow-scrolling: touch; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    /* Video background */
    .video-bg {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden;
    }
    .video-bg video {
      width: 100%; height: 100%; object-fit: cover;
      filter: blur(2px) brightness(0.35) saturate(1.3);
    }
    .video-bg::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(20,0,255,0.08) 0%, transparent 70%),
                  linear-gradient(to bottom, rgba(6,6,16,0.3) 0%, rgba(6,6,16,0.6) 100%);
    }

    /* Progress bar */
    .progress {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 200;
      background: linear-gradient(90deg, var(--blue-bright), #8B5CF6);
      box-shadow: 0 0 12px rgba(77,106,255,0.5);
      transition: width 0.5s cubic-bezier(0.16,1,0.3,1);
    }

    /* Slide container */
    .slides { position: relative; width: 100%; height: 100vh; z-index: 10; }
    .slide {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
      padding: 40px 24px;
      opacity: 0; transform: translateY(50px) scale(0.97);
      transition: opacity 0.6s cubic-bezier(0.16,1,0.3,1), transform 0.6s cubic-bezier(0.16,1,0.3,1);
      pointer-events: none;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-top: 60px;
      padding-bottom: 80px;
    }
    .slide.active {
      opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
    }
    .slide.exit-up {
      opacity: 0; transform: translateY(-50px) scale(0.97); pointer-events: none;
    }
    /* Center content for short slides */
    .slide.center-content {
      justify-content: center;
      padding-top: 40px;
    }

    /* Glass card */
    .slide-inner {
      max-width: 620px; width: 100%;
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: clamp(28px, 5vw, 44px);
      box-shadow: 0 8px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardFloat 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    @keyframes cardFloat {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Question number */
    .q-num {
      display: inline-block;
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--blue-bright); font-weight: 600; margin-bottom: 14px;
      padding: 4px 12px; border-radius: 9999px;
      background: rgba(77,106,255,0.1); border: 1px solid rgba(77,106,255,0.15);
    }
    /* Question text */
    .q-text {
      font-family: var(--font-serif); font-size: clamp(22px, 3.5vw, 32px);
      font-weight: 400; line-height: 1.35; letter-spacing: -0.01em;
      margin-bottom: 28px; color: var(--white);
    }
    .q-text em { color: var(--blue-bright); font-style: italic; }
    .q-sub {
      font-size: 13px; color: var(--white-40); font-weight: 300;
      margin-top: -16px; margin-bottom: 28px;
    }

    /* Options */
    .opts { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .opt {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 18px; border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(8px);
      cursor: pointer; transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
      user-select: none; touch-action: manipulation;
      font-size: 14px; color: var(--white-70); font-weight: 400;
      text-align: left; width: 100%;
    }
    .opt:hover {
      border-color: var(--white-20); color: var(--white);
      background: rgba(255,255,255,0.04);
      transform: translateX(4px);
    }
    .opt.selected {
      border-color: var(--blue-bright);
      background: rgba(77,106,255,0.12);
      color: var(--white);
      transform: translateX(4px);
      box-shadow: 0 0 16px rgba(77,106,255,0.15);
    }
    .opt .key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; border-radius: 8px;
      border: 1px solid var(--white-20); font-size: 11px; font-weight: 700;
      color: var(--white-40); flex-shrink: 0;
      transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    }
    .opt.selected .key {
      background: var(--blue-bright); border-color: var(--blue-bright); color: #fff;
      box-shadow: 0 0 10px rgba(77,106,255,0.4);
    }
    .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
    @media (max-width: 500px) { .opt-grid { grid-template-columns: 1fr; } }

    /* Stagger animation for options */
    .slide.active .opt { animation: optIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes optIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide.active .opts .opt:nth-child(1) { animation-delay: 0.05s; }
    .slide.active .opts .opt:nth-child(2) { animation-delay: 0.08s; }
    .slide.active .opts .opt:nth-child(3) { animation-delay: 0.11s; }
    .slide.active .opts .opt:nth-child(4) { animation-delay: 0.14s; }
    .slide.active .opts .opt:nth-child(5) { animation-delay: 0.17s; }
    .slide.active .opts .opt:nth-child(6) { animation-delay: 0.20s; }
    .slide.active .opts .opt:nth-child(7) { animation-delay: 0.23s; }
    .slide.active .opts .opt:nth-child(8) { animation-delay: 0.26s; }
    .slide.active .opts .opt:nth-child(9) { animation-delay: 0.29s; }
    .slide.active .opts .opt:nth-child(10) { animation-delay: 0.32s; }
    .slide.active .opts .opt:nth-child(11) { animation-delay: 0.35s; }

    /* Slider */
    .slider-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
      padding: 8px 0;
      animation: optIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .slider-row .s-label { font-size: 13px; color: var(--white-70); min-width: 170px; font-weight: 300; }
    .slider-row input[type="range"] {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; background: var(--white-10); border-radius: 2px; outline: none;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
      background: var(--blue-bright); cursor: pointer;
      box-shadow: 0 0 12px rgba(77,106,255,0.5);
      transition: transform 0.15s;
    }
    .slider-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    .slider-row .s-val {
      font-size: 15px; font-weight: 700; color: var(--blue-bright);
      min-width: 22px; text-align: center;
    }
    @media (max-width: 500px) {
      .slider-row { flex-wrap: wrap; }
      .slider-row .s-label { min-width: 100%; margin-bottom: 4px; }
    }

    /* Text inputs */
    .text-input, .textarea-input {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      border-radius: 14px; color: var(--white); font-family: var(--font-sans);
      font-size: 15px; outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      backdrop-filter: blur(8px);
    }
    .text-input:focus, .textarea-input:focus {
      border-color: var(--blue-bright);
      box-shadow: 0 0 16px rgba(77,106,255,0.15);
    }
    .textarea-input { resize: vertical; min-height: 120px; }
    ::placeholder { color: var(--white-20); }

    /* Buttons */
    .btn-row { display: flex; align-items: center; gap: 12px; margin-top: 28px; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border: none; border-radius: 9999px;
      background: linear-gradient(135deg, var(--blue-bright), #6C5CE7);
      color: #fff;
      font-family: var(--font-sans); font-size: 14px; font-weight: 600;
      letter-spacing: 0.04em; cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(77,106,255,0.3);
      touch-action: manipulation;
    }
    .btn-next:hover { transform: scale(1.04); box-shadow: 0 6px 28px rgba(77,106,255,0.5); }
    .btn-next:active { transform: scale(0.96); }
    .btn-back {
      padding: 12px 20px; border: 1px solid var(--glass-border); border-radius: 9999px;
      background: rgba(255,255,255,0.03); color: var(--white-40);
      font-family: var(--font-sans); font-size: 13px; cursor: pointer;
      transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .btn-back:hover { border-color: var(--white-20); color: var(--white-70); }
    .enter-hint { font-size: 11px; color: var(--white-20); margin-left: 8px; letter-spacing: 0.02em; }

    /* Intro & outro */
    .intro-title {
      font-family: var(--font-serif); font-size: clamp(32px, 5.5vw, 52px);
      font-weight: 400; line-height: 1.15; letter-spacing: -0.02em;
      margin-bottom: 20px; text-align: center;
    }
    .intro-title em { color: var(--blue-bright); font-style: italic; }
    .intro-sub {
      font-size: 15px; line-height: 1.7; color: var(--white-40);
      font-weight: 300; max-width: 460px; text-align: center; margin-bottom: 36px;
    }
    .outro-icon { font-size: 56px; margin-bottom: 24px; filter: drop-shadow(0 0 20px rgba(77,106,255,0.4)); }

    /* Question counter */
    .q-counter {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      font-size: 12px; letter-spacing: 0.08em; color: var(--white-40);
      font-weight: 400;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 9999px;
      padding: 8px 16px;
      transition: opacity 0.3s;
    }
    .q-counter span { color: var(--blue-bright); font-weight: 600; }

    /* Validation shake */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
    .validation-msg {
      font-size: 13px; color: #FF6B6B; margin-top: 8px;
      opacity: 0; transition: opacity 0.3s;
    }
    .validation-msg.show { opacity: 1; }
    .text-input.error, .textarea-input.error {
      border-color: #FF6B6B;
      box-shadow: 0 0 12px rgba(255,107,107,0.15);
    }

    /* Floating particles (subtle) */
    .particles {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(77,106,255,0.15);
      animation: float linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Video background -->
  <div class="video-bg">
    <video src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4" muted autoplay loop playsinline preload="auto"></video>
  </div>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <!-- Progress -->
  <div class="progress" id="progress"></div>

  <!-- Slides -->
  <div class="slides" id="slides"></div>

  <!-- Question counter -->
  <div class="q-counter" id="counter"></div>

  <!-- Hidden Netlify form -->
  <form name="collision-early-access" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="age" /><input name="describes-you" /><input name="describes-you-other" />
    <input name="screen-time" /><input name="best-mentally" /><input name="crash-hardest" />
    <input name="energy-control" /><input name="pain-brain-fog" /><input name="pain-difficulty-focusing" />
    <input name="pain-energy-crashes" /><input name="pain-overstimulation" /><input name="pain-caffeine-dependency" />
    <input name="pain-anxiety" /><input name="pain-burnout" /><input name="pain-trouble-sleeping" />
    <input name="pain-poor-sleep" /><input name="pain-waking-tired" /><input name="pain-lack-motivation" />
    <input name="pain-doom-scrolling" /><input name="pain-afternoon-slump" /><input name="pain-mentally-fried" />
    <input name="frustration" /><input name="stay-productive" /><input name="stay-productive-other" />
    <input name="caffeine-per-day" /><input name="fall-asleep" /><input name="fall-asleep-other" />
    <input name="want-most" /><input name="would-try" /><input name="format" /><input name="format-other" />
    <input name="pricing" /><input name="full-name" /><input name="email" /><input name="phone" />
  </form>

  <script>
    // Particles
    (function(){
      const c = document.getElementById('particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 12 + 10) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        c.appendChild(p);
      }
    })();

    // ── localStorage persistence ──
    const STORAGE_KEY = 'collision-form-progress';
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) {}
    const formData = saved.formData || {};
    let current = saved.current || 0;
    let transitioning = false;
    const totalQ = 20;

    function saveProgress() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ formData, current })); } catch(e) {}
    }
    function clearProgress() {
      try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
    }

    const questions = [
      { type:'intro', id:'intro' },
      { type:'radio', id:'age', section:'01 — Identity', q:'How old are you?', opts:['13–17','18–21','22–30','30+'] },
      { type:'radio', id:'describes-you', section:'01 — Identity', q:'What best describes you?', opts:['Student','Founder / Builder','Working professional','Gamer','Content creator','Other'], hasOther:true },
      { type:'radio', id:'screen-time', section:'01 — Identity', q:'How much daily screen time?', opts:['<3 hrs','3–6 hrs','6–9 hrs','9–12 hrs','12+ hrs'] },
      { type:'radio', id:'best-mentally', section:'02 — Energy & Focus', q:'When do you feel your <em>best</em> mentally?', opts:['Morning','Late morning','Afternoon','Evening','I rarely feel sharp'] },
      { type:'radio', id:'crash-hardest', section:'02 — Energy & Focus', q:'When do you <em>crash</em> the hardest?', opts:['Mid-morning','Afternoon','Evening','Late night','Multiple times a day'] },
      { type:'radio', id:'energy-control', section:'02 — Energy & Focus', q:'How in control of your energy do you feel?', opts:['Fully in control','Somewhat in control','Mostly reactive','Completely controlled by my energy'] },
      { type:'sliders', id:'pain', section:'03 — Pain Points', q:'Rate each from <em>1 to 5</em>', items:[
        {id:'pain-brain-fog',label:'Brain fog'},
        {id:'pain-difficulty-focusing',label:'Difficulty focusing'},
        {id:'pain-energy-crashes',label:'Energy crashes'},
        {id:'pain-overstimulation',label:'Overstimulation from screens'},
        {id:'pain-caffeine-dependency',label:'Caffeine dependency'},
        {id:'pain-anxiety',label:'Anxiety / jitteriness'},
        {id:'pain-burnout',label:'Burnout / mental fatigue'},
      ]},
      { type:'sliders', id:'pain2', section:'03 — Pain Points', q:'Rate each from <em>1 to 5</em> (continued)', items:[
        {id:'pain-trouble-sleeping',label:'Trouble falling asleep'},
        {id:'pain-poor-sleep',label:'Poor sleep quality'},
        {id:'pain-waking-tired',label:'Waking up tired'},
        {id:'pain-lack-motivation',label:'Lack of motivation'},
        {id:'pain-doom-scrolling',label:'Doom scrolling addiction'},
        {id:'pain-afternoon-slump',label:'Afternoon slump'},
        {id:'pain-mentally-fried',label:'Feeling "mentally fried" at night'},
      ]},
      { type:'textarea', id:'frustration', section:'03 — Pain Points', q:"What's the <em>one thing</em> that frustrates you the most daily?", placeholder:'Be honest — this helps us build the right thing...' },
      { type:'multi', id:'stay-productive', section:'04 — What You Use', q:'What do you use to stay productive?', sub:'Select all that apply', opts:['Black coffee','Milk coffee','Energy drinks','Diet Coke / soft drinks','Pre-workout','Nootropics','Nicotine (smoking/vaping)','Sugar / snacks','Music','Nothing','Other'], hasOther:true },
      { type:'radio', id:'caffeine-per-day', section:'04 — What You Use', q:'How many caffeinated drinks per day?', opts:['0','1–2','3–4','5+'] },
      { type:'multi', id:'fall-asleep', section:'04 — What You Use', q:'What do you use to fall asleep?', sub:'Select all that apply', opts:['Nothing','Melatonin','Scrolling (phone)','Music / podcasts','Magnesium','Ashwagandha','Medication','Just crash from exhaustion','Other'], hasOther:true },
      { type:'multi', id:'want-most', section:'05 — What You Want', q:'If you could fix your day, what would you want?', sub:'Select all that apply', opts:['⚡ Flow state on demand','🔋 All-day energy (no crashes)','🧠 No brain fog','😌 Calm focus (no jitters)','🌙 Deep sleep instantly','🔁 Recover from screen fatigue','🚫 No caffeine dependency'] },
      { type:'radio', id:'would-try', section:'05 — What You Want', q:'If ONE product could make you focus deeply, keep energy stable, remove crashes, and help you sleep — <em>would you try it?</em>', opts:['Yes','Maybe','No'] },
      { type:'multi', id:'format', section:'06 — Format', q:'What format would you <em>actually</em> use daily?', sub:'Select all that apply', opts:['Sachets (tear & mix)','Capsules / tablets','Powder tub','Ready-to-drink bottles','Shots (like energy shots)','Gummies','Dissolvable strips','Spray','Other'], hasOther:true },
      { type:'radio', id:'pricing', section:'07 — Pricing', q:'How much would you realistically pay <em>monthly?</em>', opts:['₹500–₹1000','₹1000–₹2000','₹2000–₹4000','₹4000+'] },
      { type:'contact', id:'contact', section:'08 — Early Access', q:'Almost there. Drop your details for <em>priority access.</em>' },
      { type:'outro', id:'outro' },
    ];

    const keys = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

    // ── Validation ──
    function validate() {
      const q = questions[current];
      if (!q) return true;
      const card = document.querySelector('.slide.active .slide-inner');
      if (card) {
        card.querySelectorAll('.validation-msg').forEach(m => m.remove());
        card.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
        card.classList.remove('shake');
      }
      if (q.type === 'radio') {
        if (!formData[q.id]) { showError(card, 'Please select an option'); return false; }
      } else if (q.type === 'multi') {
        if (!formData[q.id] || formData[q.id].length === 0) { showError(card, 'Please select at least one option'); return false; }
      } else if (q.type === 'contact') {
        const name = (formData['full-name'] || '').trim();
        const email = (formData['email'] || '').trim();
        const phone = (formData['phone'] || '').trim();
        if (!name || !email || !phone) {
          showError(card, 'All fields are required');
          if (card) {
            const inputs = card.querySelectorAll('.text-input');
            if (inputs[0] && !name) inputs[0].classList.add('error');
            if (inputs[1] && !email) inputs[1].classList.add('error');
            if (inputs[2] && !phone) inputs[2].classList.add('error');
          }
          return false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          showError(card, 'Please enter a valid email');
          if (card) card.querySelectorAll('.text-input')[1]?.classList.add('error');
          return false;
        }
      }
      return true;
    }
    function showError(card, msg) {
      if (!card) return;
      card.classList.add('shake');
      const el = document.createElement('p');
      el.className = 'validation-msg show';
      el.textContent = msg;
      const btnRow = card.querySelector('.btn-row');
      if (btnRow) btnRow.before(el);
      setTimeout(() => card.classList.remove('shake'), 400);
    }

    function renderSlide(i) {
      const q = questions[i];
      const d = document.createElement('div');
      const isShort = q.type === 'intro' || q.type === 'outro' || (q.type === 'radio' && q.opts.length <= 5 && !q.hasOther);
      d.className = 'slide' + (i === current ? ' active' : '') + (isShort ? ' center-content' : '');
      d.dataset.index = i;

      let html = '<div class="slide-inner">';

      if (q.type === 'intro') {
        html += `
          <div style="display:flex;flex-direction:column;align-items:center">
            <p class="intro-title">Collision — Performance for People<br/>Who <em>Think for a Living</em></p>
            <p class="intro-sub">Coffee helps for a bit. Energy drinks hit hard and drop harder. You slow down before your work is done. We're building something to fix that. Early users get priority access.</p>
            <div class="btn-row" style="justify-content:center">
              <button class="btn-next" onclick="goNext()">Let's go →</button>
            </div>
            <p style="margin-top:16px;font-size:12px;color:var(--white-20)">Takes about 3 minutes</p>
          </div>`;
      } else if (q.type === 'outro') {
        html += `
          <div style="display:flex;flex-direction:column;align-items:center">
            <div class="outro-icon">⚡</div>
            <p class="intro-title">You're <em>in.</em></p>
            <p class="intro-sub">We'll reach out with early access details soon. Welcome to Collision — performance for people who think for a living.</p>
            <div class="btn-row" style="justify-content:center">
              <a href="/" class="btn-next" style="text-decoration:none" onclick="clearProgress()">Back to Home</a>
            </div>
          </div>`;
      } else {
        if (q.section) html += `<p class="q-num">${q.section}</p>`;
        html += `<p class="q-text">${q.q}</p>`;
        if (q.sub) html += `<p class="q-sub">${q.sub}</p>`;

        if (q.type === 'radio') {
          html += '<div class="opts">';
          q.opts.forEach((o, j) => {
            const sel = formData[q.id] === o ? ' selected' : '';
            html += `<button type="button" class="opt${sel}" data-val="${o}" onclick="pickRadio('${q.id}',this)"><span class="key">${keys[j]}</span>${o}</button>`;
          });
          html += '</div>';
          if (q.hasOther) html += `<input type="text" class="text-input" style="margin-top:12px;max-width:300px" placeholder="If other, specify..." value="${formData[q.id+'-other']||''}" oninput="formData['${q.id}-other']=this.value" />`;
        } else if (q.type === 'multi') {
          html += '<div class="opts opt-grid">';
          const selected = formData[q.id] || [];
          q.opts.forEach((o, j) => {
            const sel = selected.includes(o) ? ' selected' : '';
            html += `<button type="button" class="opt${sel}" data-val="${o}" onclick="pickMulti('${q.id}',this)"><span class="key">${keys[j]}</span>${o}</button>`;
          });
          html += '</div>';
          if (q.hasOther) html += `<input type="text" class="text-input" style="margin-top:12px;max-width:300px" placeholder="If other, specify..." value="${formData[q.id+'-other']||''}" oninput="formData['${q.id}-other']=this.value" />`;
        } else if (q.type === 'sliders') {
          q.items.forEach((item, si) => {
            const val = formData[item.id] || 3;
            html += `<div class="slider-row" style="animation-delay:${si*0.04}s">
              <span class="s-label">${item.label}</span>
              <input type="range" min="1" max="5" value="${val}" oninput="formData['${item.id}']=this.value;this.nextElementSibling.textContent=this.value;saveProgress()" />
              <span class="s-val">${val}</span>
            </div>`;
          });
        } else if (q.type === 'textarea') {
          html += `<textarea class="textarea-input" placeholder="${q.placeholder||''}" oninput="formData['${q.id}']=this.value;saveProgress()">${formData[q.id]||''}</textarea>`;
        } else if (q.type === 'contact') {
          html += `
            <div style="display:flex;flex-direction:column;gap:12px">
              <input type="text" class="text-input" placeholder="Full Name *" value="${formData['full-name']||''}" oninput="formData['full-name']=this.value;saveProgress()" />
              <input type="email" class="text-input" placeholder="Email *" value="${formData['email']||''}" oninput="formData['email']=this.value;saveProgress()" />
              <input type="tel" class="text-input" placeholder="Phone Number *" value="${formData['phone']||''}" oninput="formData['phone']=this.value;saveProgress()" />
            </div>
            <p style="margin-top:16px;font-size:13px;color:var(--white-40)">Early users get priority access + exclusive pricing when we launch.</p>`;
        }

        html += '<div class="btn-row">';
        if (i > 1) html += '<button class="btn-back" onclick="goBack()">↑ Back</button>';
        const isLast = q.type === 'contact';
        html += `<button class="btn-next" onclick="${isLast ? 'submitForm()' : 'goNext()'}">${isLast ? 'Submit ✓' : 'OK ✓'}</button>`;
        html += '<span class="enter-hint">press Enter ↵</span>';
        html += '</div>';
      }

      html += '</div>';
      d.innerHTML = html;
      return d;
    }

    function pickRadio(id, el) {
      if (transitioning) return;
      formData[id] = el.dataset.val;
      el.parentElement.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      saveProgress();
      setTimeout(goNext, 400);
    }

    function pickMulti(id, el) {
      const val = el.dataset.val;
      if (!formData[id]) formData[id] = [];
      if (formData[id].includes(val)) {
        formData[id] = formData[id].filter(v => v !== val);
        el.classList.remove('selected');
      } else {
        formData[id].push(val);
        el.classList.add('selected');
      }
      saveProgress();
    }

    function showSlide(index) {
      // Hide all slides
      document.querySelectorAll('.slide').forEach(s => {
        s.classList.remove('active');
        s.classList.remove('exit-up');
      });
      // Show target
      const target = document.querySelector(`.slide[data-index="${index}"]`);
      if (target) {
        // Force reflow so the browser registers the non-active state
        void target.offsetHeight;
        target.classList.add('active');
        target.scrollTop = 0;
      }
    }

    function goNext() {
      if (transitioning) return;
      if (current >= questions.length - 1) return;
      const q = questions[current];
      if (q.type !== 'intro' && q.type !== 'sliders' && q.type !== 'textarea') {
        if (!validate()) return;
      }
      transitioning = true;
      const prev = document.querySelector('.slide.active');
      if (prev) { prev.classList.remove('active'); prev.classList.add('exit-up'); }
      current++;
      updateProgress();
      saveProgress();
      setTimeout(() => {
        showSlide(current);
        setTimeout(() => { transitioning = false; }, 300);
      }, 150);
    }

    function goBack() {
      if (transitioning) return;
      if (current <= 0) return;
      transitioning = true;
      const prev = document.querySelector('.slide.active');
      if (prev) { prev.classList.remove('active'); }
      current--;
      updateProgress();
      saveProgress();
      setTimeout(() => {
        showSlide(current);
        setTimeout(() => { transitioning = false; }, 300);
      }, 150);
    }

    function updateProgress() {
      const pct = (current / (questions.length - 1)) * 100;
      document.getElementById('progress').style.width = pct + '%';
      const counter = document.getElementById('counter');
      const qType = questions[current]?.type;
      if (qType === 'intro' || qType === 'outro') {
        counter.style.opacity = '0';
      } else {
        counter.innerHTML = `<span>${current}</span> of ${totalQ}`;
        counter.style.opacity = '1';
      }
    }

    async function submitForm() {
      if (transitioning) return;
      if (!validate()) return;
      const btn = document.querySelector('.slide.active .btn-next');
      if (btn) { btn.textContent = 'Submitting...'; btn.disabled = true; }
      const body = new URLSearchParams();
      body.append('form-name', 'collision-early-access');
      for (const [k, v] of Object.entries(formData)) {
        body.append(k, Array.isArray(v) ? v.join(', ') : v);
      }
      try {
        await fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
      } catch(e) {}
      clearProgress();
      goNext();
    }

    document.addEventListener('keydown', e => {
      if (transitioning) return;
      if (e.key === 'Enter' && questions[current]?.type !== 'textarea') {
        e.preventDefault();
        if (questions[current]?.type === 'contact') submitForm();
        else goNext();
      }
      const q = questions[current];
      if (q && (q.type === 'radio' || q.type === 'multi') && q.opts) {
        const idx = keys.indexOf(e.key.toUpperCase());
        if (idx >= 0 && idx < q.opts.length) {
          const btns = document.querySelectorAll('.slide.active .opt');
          if (btns[idx]) btns[idx].click();
        }
      }
    });

    // ── Swipe gestures ──
    (function() {
      let startY = 0, startX = 0;
      const threshold = 50;
      document.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
        startX = e.touches[0].clientX;
      }, { passive: true });
      document.addEventListener('touchend', e => {
        const dy = startY - e.changedTouches[0].clientY;
        const dx = Math.abs(startX - e.changedTouches[0].clientX);
        if (Math.abs(dy) < threshold || dx > Math.abs(dy) * 0.7) return;
        const q = questions[current];
        // Don't swipe on scrollable content pages
        if (q && (q.type === 'sliders' || q.type === 'multi' || q.type === 'contact')) return;
        if (dy > 0) goNext();
        else goBack();
      }, { passive: true });
    })();

    // ── Init ──
    const container = document.getElementById('slides');
    questions.forEach((_, i) => container.appendChild(renderSlide(i)));
    updateProgress();
  </script>
</body>
</html>
